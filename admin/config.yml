backend:
  name: git-gateway
  branch: main

media_folder: assets/images/uploads

collections:
  - name: blog
    label: Blog Posts
    folder: _posts
    create: true
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime }
      - { name: body, label: Body, widget: markdown }
