# wrangler.toml
# MK Tintworks CMS API Worker

name = "mktintworks-cms-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
MEDIA_PUBLIC_BASE_URL = "https://pub-0252224d03e4472da062ccdc92c2482f.r2.dev"
PUBLIC_SITE_BASE_URL = "https://mktintworks.com"

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "mktintworks-cms-db"
database_id = "3f383039-002d-4f05-8409-cce6cb2f2c41"

# Media bucket
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "mktintworks-media"

# Documents bucket
[[r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "mktintworks-documents"

# Shared content cache
[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "563984b4d78f4f348f9e9dee2a439365"

# Session and rate-limit storage
[[kv_namespaces]]
binding = "SESSIONS"
id = "ff770284d605469387f89836d9b11d3b"

[ai]
binding = "AI"

[triggers]
crons = ["* * * * *"]

# Secrets are configured with `wrangler secret put` and are intentionally
# not committed to this file:
# - ADMIN_EMAIL
# - JWT_SECRET
# - WEB3FORMS_KEY
# - DEPLOY_HOOK_URL

[env.production]
name = "mktintworks-cms-api"

[env.development]
name = "mktintworks-cms-api-dev"
